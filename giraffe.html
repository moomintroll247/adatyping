<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>stretchy giraffes</title>
  <style>
    :root { --sav:#ca8a04; --sav-deep:#713f12; --sav-bright:#fde047; --cream:#fdfdfb; --gold:#ffd23f; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; overflow:hidden; }
    body { background:linear-gradient(160deg,#713f12,#ca8a04 55%,#fde047);
           font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
    #bg { position:fixed; inset:0; overflow:hidden; z-index:0; }
    .bubble { position:absolute; bottom:-25vh; border-radius:50%;
      background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.45),rgba(255,255,255,.05)); animation:rise linear infinite; }
    @keyframes rise { 0%{transform:translateY(0);opacity:0} 12%{opacity:.6} 88%{opacity:.6} 100%{transform:translateY(-135vh) translateX(var(--drift,0));opacity:0} }
    #squish { position:fixed; inset:0; z-index:40; pointer-events:none; }
    #toforest { position:fixed; top:2.5vh; left:2.5vw; z-index:60; width:13vmin; height:13vmin; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:7vmin; text-decoration:none;
      background:rgba(255,255,255,.2); border:.5vmin solid rgba(255,255,255,.5); }
    #ver { position:fixed; right:8px; bottom:6px; z-index:100; font:13px/1 ui-monospace,monospace; color:rgba(255,255,255,.6); }
    #stage { position:relative; z-index:10; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:2vh; padding-bottom:2vh; }

    /* ---- the savanna: two giraffes stretch toward each other ---- */
    #savanna { position:fixed; top:14vh; left:0; right:0; height:26vh; z-index:8; pointer-events:none; }
    .gir { position:absolute; top:0; font-size:16vmin; line-height:1; transition:left .35s cubic-bezier(.3,1.2,.5,1), right .35s cubic-bezier(.3,1.2,.5,1); }
    #girL { left:4%; }
    #girR { right:4%; transform:scaleX(-1); }
    .gir.nudge { animation:nudge .35s ease-out; }
    @keyframes nudge { 50%{margin-top:-1.6vmin} }
    #love { position:absolute; top:2vh; left:50%; transform:translateX(-50%) scale(0); font-size:10vmin; }
    #love.pop { animation:lovepop .6s cubic-bezier(.2,1.6,.4,1) forwards; }
    @keyframes lovepop { 0%{transform:translateX(-50%) scale(0)} 100%{transform:translateX(-50%) scale(1)} }

    #pips { display:flex; align-items:center; margin-bottom:3vh; }
    .pip { border-radius:50%; background:rgba(255,255,255,.18); border:.4vmin solid rgba(255,255,255,.5); }
    .pip.on { animation:pippop .35s cubic-bezier(.2,1.5,.4,1) forwards; }
    @keyframes pippop { 0%{transform:scale(.4)} 100%{transform:scale(1)} }
    #deck { display:flex; align-items:flex-end; gap:14vmin; }
    .kcol { display:flex; flex-direction:column; align-items:center; gap:2.5vmin; }
    .bigkey { width:20vmin; height:20vmin; border-radius:24px; background:var(--cream); opacity:.35; transition:opacity .2s, transform .2s;
      display:flex; align-items:center; justify-content:center; font-size:12vmin; font-weight:800; color:var(--sav-deep);
      box-shadow:0 1vmin 0 rgba(0,0,0,.18), inset 0 0 0 .7vmin var(--sav-bright); }
    .bigkey.want { opacity:1; transform:scale(1.12); box-shadow:0 1vmin 0 rgba(0,0,0,.18), inset 0 0 0 .7vmin var(--gold), 0 0 5vmin rgba(255,210,63,.55); }
    .bigkey.nope { animation:nope .35s; }
    @keyframes nope { 0%,100%{transform:translateX(0) scale(1.12)} 25%{transform:translateX(-2vmin) scale(1.12)} 75%{transform:translateX(2vmin) scale(1.12)} }
    .hand { position:relative; width:24vmin; height:30vmin; }
    .hand.left { transform:scaleX(-1); }
    #ticks { position:fixed; top:2.5vh; right:2.5vw; z-index:60; display:flex; gap:1.5vmin; }
    .tick { width:6.5vmin; height:6.5vmin; border-radius:50%; background:rgba(255,255,255,.15);
      border:.5vmin solid rgba(255,255,255,.5); display:flex; align-items:center; justify-content:center; font-size:4vmin; }
    .tick.done { background:rgba(255,210,63,.3); border-color:#ffd23f; }
    #grad { position:fixed; inset:0; z-index:55; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    #gradcup { font-size:32vmin; animation:gradpop 1s cubic-bezier(.2,1.4,.4,1), gradbob 2.2s ease-in-out 1s infinite;
      filter:drop-shadow(0 0 6vmin rgba(255,210,63,.8)); }
    @keyframes gradpop { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }
    @keyframes gradbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3vmin)} }
    #toforest.glow { border-color:#ffd23f; animation:tglow 1.2s ease-in-out infinite; }
    @keyframes tglow { 0%,100%{box-shadow:0 0 2vmin rgba(255,210,63,.5)} 50%{box-shadow:0 0 7vmin rgba(255,210,63,.95)} }
  </style>
</head>
<body>
  <div id="bg"></div>
  <a id="toforest" href="index.html?from=deep2" aria-label="forest">🌲</a>
  <div id="ticks"></div>
  <canvas id="squish"></canvas>
  <div id="savanna">
    <div class="gir" id="girL">🦒</div>
    <div class="gir" id="girR">🦒</div>
    <div id="love">💕</div>
  </div>
  <main id="stage">
    <div id="pips"></div>
    <div id="deck">
      <div class="kcol"><div class="bigkey" id="kg">g</div><div class="hand left" id="hl"></div></div>
      <div class="kcol"><div class="bigkey" id="kh">h</div><div class="hand" id="hr"></div></div>
    </div>
  </main>
  <div id="ver">giraffe v1</div>

  <script src="hand.js?v=5"></script>
  <script>
    buildHand(document.getElementById('hl'), {cuff:'#713f12'});
    buildHand(document.getElementById('hr'), {cuff:'#713f12'});
    // g and h live in the middle of the keyboard: the index fingers REACH for them.
    // Each press stretches that side's giraffe toward the middle — noses meet = love.
    function randOf(set, n){ let s=''; for(let i=0;i<n;i++) s+=set[(Math.random()*set.length)|0]; return s; }
    const STAGES = ['ghghgh', 'gghhgghh', randOf('gh', 10)];
    let stage = 0, idx = 0, busy = false;
    const girL = document.getElementById('girL'), girR = document.getElementById('girR'),
          love = document.getElementById('love'),
          kg = document.getElementById('kg'), kh = document.getElementById('kh'),
          hl = document.getElementById('hl'), hr = document.getElementById('hr');

    (function(){ const bg=document.getElementById('bg');
      for(let i=0;i<10;i++){ const b=document.createElement('div'); b.className='bubble';
        const s=6+Math.random()*14; b.style.width=b.style.height=s+'vmin'; b.style.left=Math.random()*100+'vw';
        b.style.setProperty('--drift',(Math.random()*20-10)+'vw'); b.style.animationDuration=(14+Math.random()*14)+'s';
        b.style.animationDelay=(-Math.random()*20)+'s'; bg.appendChild(b);} })();

    const pipsEl = document.getElementById('pips');
    function buildPips(n){ pipsEl.innerHTML=''; const sz=Math.min(5, 60/n); pipsEl.style.gap=Math.min(2, 14/n)+'vmin';
      for(let i=0;i<n;i++){ const p=document.createElement('div'); p.className='pip'; p.style.width=p.style.height=sz+'vmin'; pipsEl.appendChild(p);} }
    function markPip(i){ const p=pipsEl.children[i]; if(p){ p.classList.add('on'); p.style.background=COLS[i%COLS.length]; p.style.borderColor='rgba(255,255,255,.8)'; } }

    const SKEY = 'giraffe';
    const sealBark = new Audio('assets/seal.mp3'), sealCheer = new Audio('assets/seal_cheer.mp3');
    let round = Math.min(3, +(localStorage.getItem('ada.rounds.'+SKEY)||0));
    const ticksEl = document.getElementById('ticks');
    function drawTicks(){ ticksEl.innerHTML='';
      for(let i=0;i<3;i++){ const t=document.createElement('div'); t.className='tick'+(i<round?' done':'');
        t.textContent=i<round?'⭐':''; ticksEl.appendChild(t); } }
    function graduate(){
      busy = true;
      const g=document.createElement('div'); g.id='grad'; g.innerHTML='<div id="gradcup">🏆</div>';
      document.body.appendChild(g);
      document.getElementById('toforest').classList.add('glow');
      sealCheer.currentTime = 0; sealCheer.play().catch(()=>{});
      [0,700,1400].forEach(d=>setTimeout(()=>{ chord(); squishBurst(); }, d));
    }
    drawTicks();

    let gSteps = 0, hSteps = 0, gTotal = 1, hTotal = 1;
    function want(){ return STAGES[stage][idx]; }
    function cue(){
      const w = want();
      kg.classList.toggle('want', w==='g'); kh.classList.toggle('want', w==='h');
      hl.querySelector('.f-index').classList.toggle('active', w==='g');
      hr.querySelector('.f-index').classList.toggle('active', w==='h');
    }
    function place(){
      girL.style.left  = (4 + (gSteps/gTotal) * 34) + '%';   // 4% -> 38% (nose to middle)
      girR.style.right = (4 + (hSteps/hTotal) * 34) + '%';
    }
    function renderStage(){
      const seq = STAGES[stage];
      idx = 0; gSteps = 0; hSteps = 0;
      gTotal = Math.max(1, [...seq].filter(c=>c==='g').length);
      hTotal = Math.max(1, [...seq].filter(c=>c==='h').length);
      love.classList.remove('pop'); place(); buildPips(seq.length); cue();
    }
    function press(){
      const seq = STAGES[stage], ch = seq[idx];
      const hand = ch==='g' ? hl : hr, gir = ch==='g' ? girL : girR;
      const fin = hand.querySelector('.f-index');
      fin.classList.add('tap'); setTimeout(()=>fin.classList.remove('tap'),120);
      if(ch==='g') gSteps++; else hSteps++;
      place();
      gir.classList.remove('nudge'); void gir.offsetWidth; gir.classList.add('nudge');
      tone(idx); markPip(idx);
      idx++;
      if(idx >= seq.length){
        busy = true;
        kg.classList.remove('want'); kh.classList.remove('want');
        hl.querySelector('.f-index').classList.remove('active'); hr.querySelector('.f-index').classList.remove('active');
        setTimeout(()=>{ love.classList.add('pop'); chord(); squishBurst(); }, 450);
        setTimeout(next, 2600);
      } else cue();
    }
    function next(){
      stage++;
      if(stage >= STAGES.length){
        stage = 0; round++; drawTicks();
        localStorage.setItem('ada.rounds.'+SKEY, round);
        sealBark.currentTime = 0; sealBark.play().catch(()=>{});
        if(round >= 3){ graduate(); return; }
        STAGES[2] = randOf('gh', 10);
      }
      renderStage(); busy = false;
    }

    addEventListener('keydown',(e)=>{
      if(busy || e.key.length!==1) return;
      if(e.key.toLowerCase()===want()) press();
      else { const k = want()==='g' ? kg : kh;
        k.classList.remove('nope'); void k.offsetWidth; k.classList.add('nope'); }
    });

    // ---- arc-2 sounds: warm marimba, pentatonic ----
    let actx=null;
    function ac(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
    const BASE = 262, PENT=[1, 9/8, 5/4, 3/2, 5/3, 2];
    function tone(n){
      const c=ac(), t=c.currentTime, f=BASE * Math.pow(2, Math.floor(n/6)) * PENT[n%6];
      [[f,.42,.55],[f*4,.1,.12]].forEach(([ff,v,len])=>{ const o=c.createOscillator(), g=c.createGain();
        o.type='sine'; o.frequency.value=ff;
        g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(v,t+.008);
        g.gain.exponentialRampToValueAtTime(.0001,t+len);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t+len+.05); });
    }
    function chord(){
      const c=ac(), t=c.currentTime;
      [BASE*2, BASE*2.5, BASE*3, BASE*4].forEach((f,k)=>{ const o=c.createOscillator(), g=c.createGain();
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(.0001,t+k*.05); g.gain.exponentialRampToValueAtTime(.2,t+.06+k*.05);
        g.gain.exponentialRampToValueAtTime(.0001,t+1.5);
        o.connect(g).connect(c.destination); o.start(t+k*.05); o.stop(t+1.6); });
    }

    // ---- arc-2 squishies: stars & hearts, spinning, bouncy ----
    const cv=document.getElementById('squish'), cx=cv.getContext('2d');
    function fit(){ cv.width=innerWidth; cv.height=innerHeight; }
    addEventListener('resize',fit); fit();
    const COLS=['#fde047','#facc15','#ff6b9d','#2dd4bf','#a78bfa','#fff'];
    let squishes=[], raf=null;
    const G=0.75, REST=0.62;
    function squishBurst(){
      const cxp=innerWidth/2, cyp=innerHeight*0.4;
      const KINDS=['star','heart','circle'];
      for(let i=0;i<26;i++){
        squishes.push({
          x:cxp+(Math.random()-.5)*120, y:cyp+(Math.random()-.5)*60,
          vx:(Math.random()-.5)*22, vy:-Math.random()*13-4,
          r:14+Math.random()*15, c:COLS[(Math.random()*COLS.length)|0], squash:1,
          rot:Math.random()*6.28, vr:(Math.random()-.5)*0.25,
          kind:KINDS[(Math.random()*KINDS.length)|0], born:performance.now() });
      }
      if(squishes.length>70) squishes.splice(0, squishes.length-70);
      if(!raf) loop();
    }
    function starP(r){ cx.beginPath(); for(let i=0;i<10;i++){ const a=i*Math.PI/5-Math.PI/2, rad=i%2? r*0.45:r;
      const x=Math.cos(a)*rad, y=Math.sin(a)*rad; i?cx.lineTo(x,y):cx.moveTo(x,y);} cx.closePath(); }
    function heartP(r){ cx.beginPath(); cx.moveTo(0, r*0.42);
      cx.bezierCurveTo(-r*1.15, -r*0.35, -r*0.6, -r*1.15, 0, -r*0.45);
      cx.bezierCurveTo(r*0.6, -r*1.15, r*1.15, -r*0.35, 0, r*0.42); cx.closePath(); }
    function loop(){
      cx.clearRect(0,0,cv.width,cv.height);
      const nowT=performance.now();
      squishes=squishes.filter(s=>{ if(nowT-s.born>5500) s.r*=0.90; return s.r>2; });
      if(!squishes.length){ raf=null; return; }
      for(const s of squishes){
        s.vy+=G; s.x+=s.vx; s.y+=s.vy; s.rot+=s.vr;
        if(s.y+s.r>cv.height){ s.y=cv.height-s.r; if(s.vy>4)s.squash=.65; s.vy*=-REST; s.vx*=.95; s.vr*=.9; if(Math.abs(s.vy)<1.4)s.vy=0; }
        if(s.x<s.r){ s.x=s.r; s.vx*=-REST; } if(s.x>cv.width-s.r){ s.x=cv.width-s.r; s.vx*=-REST; }
        s.squash+=(1-s.squash)*0.15;
      }
      for(const s of squishes){
        cx.save(); cx.translate(s.x,s.y); cx.rotate(s.rot); cx.scale(2-s.squash, s.squash);
        cx.fillStyle=s.c;
        if(s.kind==='star') starP(s.r); else if(s.kind==='heart') heartP(s.r);
        else { cx.beginPath(); cx.arc(0,0,s.r,0,7); }
        cx.fill();
        cx.restore();
      }
      raf=requestAnimationFrame(loop);
    }

    renderStage();
  </script>
</body>
</html>
