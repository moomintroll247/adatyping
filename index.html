<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ada's Forest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0f766e; }
    canvas { display: block; }
    /* textless "tap to start" (needed to grab the mouse for looking around) */
    #start {
      position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, #14b8a6, #0f766e);
      cursor: pointer;
    }
    #start .ring {
      width: 28vmin; height: 28vmin; border-radius: 50%;
      border: 1.4vmin solid rgba(255,255,255,.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 14vmin; animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{ transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,.4); }
                       50%{ transform: scale(1.08); box-shadow: 0 0 8vmin 2vmin rgba(255,255,255,.25); } }
    /* crosshair dot */
    #dot { position: fixed; left: 50%; top: 50%; width: 1.6vmin; height: 1.6vmin; margin: -.8vmin 0 0 -.8vmin;
           border-radius: 50%; background: rgba(255,255,255,.7); z-index: 5; pointer-events: none; display: none; }
    #ver { position: fixed; right: 8px; bottom: 6px; z-index: 100; font: 13px/1 ui-monospace, monospace;
           color: rgba(255,255,255,.6); pointer-events: none; }
  </style>
</head>
<body>
  <div id="dot"></div>
  <div id="ver">forest v17</div>
  <div id="start"><div class="ring">🌲</div></div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const TEAL = 0x14b8a6, SKY = 0x5eead4;
    const GLADE = new THREE.Vector3(0, 0, -14);   // glade 1 (name lesson) — straight ahead
    const GLADE2 = new THREE.Vector3(11, 0, -16);  // glade 2 (j & k) — off to the RIGHT (right hand)
    const GLADE3 = new THREE.Vector3(-11, 0, -16); // glade 3 (d & f) — off to the LEFT (left hand)

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SKY);
    scene.fog = new THREE.Fog(SKY, 12, 70);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 1.6, 8);
    camera.lookAt(GLADE.x, 1.6, GLADE.z);          // start facing the glade
    scene.add(camera);

    scene.add(new THREE.HemisphereLight(0xddffff, 0x3a7a4a, 1.1));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(8, 20, 6); scene.add(sun);

    // ground + a lighter path down the middle
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshStandardMaterial({ color: 0x2f9e6e })
    );
    ground.rotation.x = -Math.PI / 2;   // lay it FLAT (mustn't chain off scene.add — that returns the scene)
    scene.add(ground);
    const path = new THREE.Mesh(new THREE.PlaneGeometry(5, 80), new THREE.MeshStandardMaterial({ color: 0x6fcf97 }));
    path.rotation.x = -Math.PI / 2; path.position.set(0, 0.01, -20); scene.add(path);

    // trees (simple: trunk + cone), kept off the central corridor
    function tree(x, z) {
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2.2, 6), new THREE.MeshStandardMaterial({ color: 0x7a5230 }));
      trunk.position.y = 1.1; g.add(trunk);
      const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.8, 4, 8), new THREE.MeshStandardMaterial({ color: 0x2e8b57 }));
      leaves.position.y = 3.6; g.add(leaves);
      g.position.set(x, 0, z); scene.add(g);
    }
    for (let i = 0; i < 80; i++) {
      const x = (Math.random() * 2 - 1) * 80;
      const z = -6 - Math.random() * 90;             // only ahead of the player, never at spawn
      if (Math.abs(x) < 7) continue;                 // keep a wide clear corridor down the path
      if (Math.hypot(x - GLADE.x, z - GLADE.z) < 9) continue;   // keep glade 1 clear
      if (Math.hypot(x - GLADE2.x, z - GLADE2.z) < 7) continue;  // keep glade 2 clear
      if (Math.hypot(x - GLADE3.x, z - GLADE3.z) < 7) continue;  // keep glade 3 clear
      tree(x, z);
    }

    // ---- the open glade: a glowing portal + the axolotl greeter ----
    const portal = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0xff6b9d })     // pink — pops against teal, matches the axolotl
    );
    portal.position.set(GLADE.x, 3, GLADE.z); scene.add(portal);
    // glade 2 portal (purple — the j & k squishy glade)
    const portal2 = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0xa78bfa })
    );
    portal2.position.set(GLADE2.x, 3, GLADE2.z); scene.add(portal2);
    // glade 3 portal (teal — the d & f fidget glade)
    const portal3 = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0x2dd4bf })
    );
    portal3.position.set(GLADE3.x, 3, GLADE3.z); scene.add(portal3);

    // ---- a cute low-poly 3D axolotl, built from primitives (faces +Z) ----
    function makeAxolotl() {
      const g = new THREE.Group();
      const gills = [];
      const pink   = new THREE.MeshStandardMaterial({ color: 0xff7bb0, roughness: .85 });
      const pink2  = new THREE.MeshStandardMaterial({ color: 0xffb0d6, roughness: .9 });
      const purple = new THREE.MeshStandardMaterial({ color: 0x8e54d6, roughness: .8 });
      const dark   = new THREE.MeshStandardMaterial({ color: 0x2a1133 });
      const white  = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const ball = (r, m, sx, sy, sz, x, y, z) => {
        const b = new THREE.Mesh(new THREE.SphereGeometry(r, 20, 16), m);
        b.scale.set(sx, sy, sz); b.position.set(x, y, z); g.add(b); return b;
      };
      ball(1, pink, 1.15, .9, 1.35, 0, 0, 0);          // body
      ball(.85, pink, 1.05, .95, .9, 0, .25, .95);     // head
      ball(.8, pink2, 1.0, .55, 1.2, 0, -.45, .3);     // tummy
      // eyes
      for (const s of [-1, 1]) {
        ball(.17, white, 1, 1, 1, .32 * s, .45, 1.55);
        ball(.09, dark, 1, 1, 1, .34 * s, .45, 1.68);
      }
      // smile
      const smile = new THREE.Mesh(new THREE.TorusGeometry(.18, .03, 8, 16, Math.PI), dark);
      smile.rotation.z = Math.PI; smile.position.set(0, .1, 1.62); g.add(smile);
      // 3 big feathery external gills per side — sprout from the SIDES and stick OUT (the hallmark)
      for (const s of [-1, 1]) for (let i = 0; i < 3; i++) {
        const gill = new THREE.Group();
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(.04, .09, .85, 6), purple);
        stalk.position.y = .42; gill.add(stalk);
        for (let j = 0; j < 5; j++) {                       // feathery blobs — alternate purple/pink for streaks
          const blob = new THREE.Mesh(new THREE.SphereGeometry(.18 - j * .02, 10, 8), j % 2 ? pink : purple);
          blob.position.set((j % 2 ? 1 : -1) * .11, .18 + j * .16, 0);
          gill.add(blob);
        }
        gill.position.set(.8 * s, .4, .5);                  // emerge from the side of the head
        gill.rotation.x = -0.3;                              // slight back-sweep
        gill.rotation.z = -s * (0.9 + i * 0.35);            // point OUT to the side (−s = outward), fanned up
        gill.userData = { baseX: -0.3, phase: i * 0.8 + (s < 0 ? 1.6 : 0) };
        g.add(gill); gills.push(gill);
      }
      // paddle tail
      const tail = new THREE.Mesh(new THREE.ConeGeometry(.5, 1.3, 12), pink);
      tail.scale.set(1, .4, 1); tail.rotation.x = -Math.PI / 2; tail.position.set(0, 0, -1.35); g.add(tail);
      // stubby feet
      for (const sx of [-1, 1]) for (const sz of [.65, -.5]) ball(.22, pink, 1, .6, 1.2, .78 * sx, -.7, sz);
      g.userData.gills = gills;
      return g;
    }
    const axo = makeAxolotl();
    axo.position.set(GLADE.x, 1.9, GLADE.z + 0.2);
    scene.add(axo);

    // ---- Stitch (j/k glade greeter), low-poly from primitives, faces +Z ----
    function makeStitch() {
      const g = new THREE.Group();
      const blue  = new THREE.MeshStandardMaterial({ color: 0x4f9fe0, roughness: .8 });
      const belly = new THREE.MeshStandardMaterial({ color: 0xbfe2fb, roughness: .85 });
      const dark  = new THREE.MeshStandardMaterial({ color: 0x1a1326 });
      const white = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const ball = (r, m, sx, sy, sz, x, y, z) => {
        const b = new THREE.Mesh(new THREE.SphereGeometry(r, 18, 14), m);
        b.scale.set(sx, sy, sz); b.position.set(x, y, z); g.add(b); return b;
      };
      ball(1.0,  blue,  1.05, 1.05, 0.95, 0,  0,    0);     // body
      ball(0.72, belly, 0.85, 0.8,  0.6,  0, -0.2,  0.62);  // belly
      ball(0.92, blue,  1.1,  0.95, 1.0,  0,  1.05, 0.08);  // head
      // ears — tall, swept out
      for (const s of [-1, 1]) {
        const ear = new THREE.Group();
        const o = new THREE.Mesh(new THREE.SphereGeometry(0.42, 14, 12), blue);  o.scale.set(0.5, 1.35, 0.38); ear.add(o);
        const i = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 10), belly);  i.scale.set(0.45, 1.2, 0.3); i.position.z = 0.1; ear.add(i);
        ear.position.set(0.68 * s, 1.85, 0.05); ear.rotation.z = s * 0.5; ear.rotation.x = -0.15; g.add(ear);
      }
      // big eyes + glints
      for (const s of [-1, 1]) {
        ball(0.27, dark,  0.78, 1.0, 0.6, 0.33 * s, 1.12, 0.86);
        ball(0.07, white, 1, 1, 1,       0.4 * s,  1.22, 1.04);
      }
      ball(0.13, dark, 1.3, 0.85, 1, 0, 0.92, 1.05);        // nose
      const smile = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.05, 8, 20, Math.PI), dark);
      smile.rotation.z = Math.PI; smile.position.set(0, 0.66, 0.96); g.add(smile);
      // head tuft
      for (const dx of [-0.34, 0, 0.34]) {
        const sp = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.42, 8), blue);
        sp.position.set(dx, 1.95, -0.18); g.add(sp);
      }
      // arms + feet
      for (const s of [-1, 1]) {
        const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.22, 0.5, 6, 10), blue);
        arm.position.set(1.0 * s, -0.1, 0.2); arm.rotation.z = s * 0.55; g.add(arm);
        const foot = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10), blue);
        foot.scale.set(1, 0.6, 1.35); foot.position.set(0.5 * s, -1.0, 0.4); g.add(foot);
      }
      return g;
    }
    const stitch = makeStitch();
    stitch.position.set(GLADE2.x, 1.3, GLADE2.z + 0.2);
    scene.add(stitch);

    // ---- little axolotl sibling (d/f glade greeter) — same model, scaled down ----
    const lilAxo = makeAxolotl();
    lilAxo.scale.setScalar(0.55);
    lilAxo.position.set(GLADE3.x, 1.5, GLADE3.z + 0.2);
    scene.add(lilAxo);

    // ---- two locked gates further on (dim, not enterable yet) ----
    function lockedGate(x, z) {
      const m = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.3, 12, 32),
        new THREE.MeshStandardMaterial({ color: 0x2a4a45 }));
      m.position.set(x, 2.2, z); scene.add(m);
    }
    lockedGate(-16, -34); lockedGate(16, -34);

    // ---- first-person controls ----
    const controls = new PointerLockControls(camera, renderer.domElement);
    const startEl = document.getElementById('start'), dot = document.getElementById('dot');
    startEl.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock',   () => { startEl.style.display = 'none'; dot.style.display = 'block'; });
    controls.addEventListener('unlock', () => { startEl.style.display = 'flex'; dot.style.display = 'none'; });

    const keys = {};
    addEventListener('keydown', e => keys[e.code] = true);
    addEventListener('keyup',   e => keys[e.code] = false);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    let entered = false;
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);
      if (controls.isLocked) {
        const v = 7 * dt;
        if (keys.KeyW || keys.ArrowUp)    controls.moveForward(v);
        if (keys.KeyS || keys.ArrowDown)  controls.moveForward(-v);
        if (keys.KeyA || keys.ArrowLeft)  controls.moveRight(-v);
        if (keys.KeyD || keys.ArrowRight) controls.moveRight(v);
        camera.position.x = Math.max(-90, Math.min(90, camera.position.x));
        camera.position.z = Math.max(-95, Math.min(95, camera.position.z));
        // walked into the glade → start the typing lesson
        const d = Math.hypot(camera.position.x - GLADE.x, camera.position.z - GLADE.z);
        if (!entered && d < 3.2) { entered = true; location.href = 'index.html'; }
        const d2 = Math.hypot(camera.position.x - GLADE2.x, camera.position.z - GLADE2.z);
        if (!entered && d2 < 3.2) { entered = true; location.href = 'jk.html'; }
        const d3 = Math.hypot(camera.position.x - GLADE3.x, camera.position.z - GLADE3.z);
        if (!entered && d3 < 3.2) { entered = true; location.href = 'df.html'; }
      }
      axo.rotation.y = Math.atan2(camera.position.x - GLADE.x, camera.position.z - GLADE.z);  // face the player
      axo.position.y = 1.9 + Math.sin(clock.elapsedTime * 1.6) * 0.12;    // gentle bob
      for (const gl of axo.userData.gills)                                // feathery gills sway underwater
        gl.rotation.x = gl.userData.baseX + Math.sin(clock.elapsedTime * 2 + gl.userData.phase) * 0.14;
      // Stitch (j/k glade) — face player + bob
      stitch.rotation.y = Math.atan2(camera.position.x - GLADE2.x, camera.position.z - GLADE2.z);
      stitch.position.y = 1.3 + Math.sin(clock.elapsedTime * 1.5 + 1) * 0.1;
      // little axolotl (d/f glade) — face player, bob, gills sway
      lilAxo.rotation.y = Math.atan2(camera.position.x - GLADE3.x, camera.position.z - GLADE3.z);
      lilAxo.position.y = 1.5 + Math.sin(clock.elapsedTime * 1.8 + 2) * 0.1;
      for (const gl of lilAxo.userData.gills)
        gl.rotation.x = gl.userData.baseX + Math.sin(clock.elapsedTime * 2.2 + gl.userData.phase) * 0.14;
      portal.scale.setScalar(1 + Math.sin(clock.elapsedTime * 2) * 0.04); // gentle pulse
      portal.rotation.z += dt * 0.3;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
