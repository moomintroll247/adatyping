<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ada's Forest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0f766e; }
    canvas { display: block; }
    /* textless "tap to start" (needed to grab the mouse for looking around) */
    #start {
      position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, #14b8a6, #0f766e);
      cursor: pointer;
    }
    #start .ring {
      width: 28vmin; height: 28vmin; border-radius: 50%;
      border: 1.4vmin solid rgba(255,255,255,.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 14vmin; animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{ transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,.4); }
                       50%{ transform: scale(1.08); box-shadow: 0 0 8vmin 2vmin rgba(255,255,255,.25); } }
    /* crosshair dot */
    #dot { position: fixed; left: 50%; top: 50%; width: 1.6vmin; height: 1.6vmin; margin: -.8vmin 0 0 -.8vmin;
           border-radius: 50%; background: rgba(255,255,255,.7); z-index: 5; pointer-events: none; display: none; }
    #ver { position: fixed; right: 8px; bottom: 6px; z-index: 100; font: 13px/1 ui-monospace, monospace;
           color: rgba(255,255,255,.6); pointer-events: none; }
  </style>
</head>
<body>
  <div id="dot"></div>
  <div id="ver">forest v25</div>
  <div id="start"><div class="ring">🌲</div></div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const TEAL = 0x14b8a6, SKY = 0x5eead4;
    const GLADE = new THREE.Vector3(0, 0, -14);   // glade 1 (name lesson) — straight ahead
    const GLADE2 = new THREE.Vector3(11, 0, -16);  // glade 2 (j & k) — off to the RIGHT (right hand)
    const GLADE3 = new THREE.Vector3(-11, 0, -16); // glade 3 (d & f) — off to the LEFT (left hand)
    const GLADE4 = new THREE.Vector3(6, 0, -30);   // glade 4 (earring studio, l) — deeper down the path
    const GLADE5 = new THREE.Vector3(-6, 0, -30);  // glade 5 (snail spa, s)
    const GLADE6 = new THREE.Vector3(14, 0, -36);  // glade 6 (ant parade, a)
    const GLADE7 = new THREE.Vector3(-14, 0, -36); // glade 7 (the wink, ;)
    const GLADE8 = new THREE.Vector3(0, 0, -44);   // glade 8 (butterfly wings, a & ;)
    const GLADE9  = new THREE.Vector3(-7, 0, -58);  // ARC 2: hair braider (asdf)
    const GLADE10 = new THREE.Vector3(7, 0, -58);   // ARC 2: juggling fox (jkl;)
    const GLADE11 = new THREE.Vector3(-15, 0, -66); // ARC 2: stretchy giraffes (g h)
    const GLADE12 = new THREE.Vector3(15, 0, -66);  // ARC 2: tightrope (mirror pairs)

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SKY);
    scene.fog = new THREE.Fog(SKY, 12, 70);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0, 1.6, 8);
    camera.lookAt(GLADE.x, 1.6, GLADE.z);          // start facing the glade
    // Coming back from a station (?from=...): skip the entry gate and spawn straight in.
    // ?from=deep also drops you PAST the first ring, facing the Arc-1 clearing —
    // progress you can feel, and no long walk back.
    const QS = new URLSearchParams(location.search);
    const FROM = QS.get('from');
    // parent controls (not linked anywhere): ?grant opens the star gate, ?reset wipes all progress
    const ALLKEYS = ['jk','df','earrings','snail','ants','wink','butterfly','braid','juggle','giraffe','tightrope'];
    if (QS.has('grant')) ALLKEYS.slice(0, 7).forEach(k => localStorage.setItem('ada.rounds.' + k, '3'));
    if (QS.has('reset')) ALLKEYS.forEach(k => localStorage.removeItem('ada.rounds.' + k));
    if (FROM === 'deep') {
      camera.position.set(0, 1.6, -21);
      camera.lookAt(0, 1.6, -32);
    }
    if (FROM === 'deep2') {                        // back from an Arc-2 station: past the star gate
      camera.position.set(0, 1.6, -52.5);
      camera.lookAt(0, 1.6, -62);
    }
    scene.add(camera);

    scene.add(new THREE.HemisphereLight(0xddffff, 0x3a7a4a, 1.1));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(8, 20, 6); scene.add(sun);

    // ground + a lighter path down the middle
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshStandardMaterial({ color: 0x2f9e6e })
    );
    ground.rotation.x = -Math.PI / 2;   // lay it FLAT (mustn't chain off scene.add — that returns the scene)
    scene.add(ground);
    const path = new THREE.Mesh(new THREE.PlaneGeometry(5, 80), new THREE.MeshStandardMaterial({ color: 0x6fcf97 }));
    path.rotation.x = -Math.PI / 2; path.position.set(0, 0.01, -20); scene.add(path);

    // trees — three varied species, scattered & kept off the central corridor
    const TRUNK = 0x7a5230, BIRCH = 0xe8e8e0;
    const GREENS = [0x2e8b57, 0x35a06a, 0x277a4b, 0x3fb07a, 0x6fbf73];
    const pick = a => a[(Math.random() * a.length) | 0];
    function pineTree(g, s) {                          // tall conifer: stacked cones
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.4, 2 * s, 6), new THREE.MeshStandardMaterial({ color: TRUNK }));
      trunk.position.y = s; g.add(trunk);
      const col = pick(GREENS);
      for (let k = 0; k < 3; k++) {
        const c = new THREE.Mesh(new THREE.ConeGeometry((1.7 - k * 0.45) * s, (1.9 - k * 0.2) * s, 8), new THREE.MeshStandardMaterial({ color: col }));
        c.position.y = (2.2 + k * 1.3) * s; g.add(c);
      }
    }
    function roundTree(g, s) {                         // deciduous: trunk + blobby canopy (sometimes autumnal)
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.42, 2.4 * s, 6), new THREE.MeshStandardMaterial({ color: TRUNK }));
      trunk.position.y = 1.2 * s; g.add(trunk);
      const col = Math.random() < 0.25 ? pick([0xd98c32, 0xc25a3a, 0xe0b13a]) : pick(GREENS);
      const mat = new THREE.MeshStandardMaterial({ color: col, roughness: .9 });
      for (const [dx, dy, dz, r] of [[0, 3.0, 0, 1.7], [-1, 2.5, .3, 1.1], [1, 2.6, -.2, 1.15], [.2, 3.6, .3, 1.0]]) {
        const b = new THREE.Mesh(new THREE.SphereGeometry(r * s, 12, 10), mat); b.position.set(dx * s, dy * s, dz * s); g.add(b);
      }
    }
    function birchTree(g, s) {                         // slim pale trunk + small canopy
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 4 * s, 6), new THREE.MeshStandardMaterial({ color: BIRCH }));
      trunk.position.y = 2 * s; g.add(trunk);
      const mat = new THREE.MeshStandardMaterial({ color: 0x8fce6a, roughness: .9 });
      for (const [dx, dy, dz, r] of [[0, 4.4, 0, 1.1], [-.6, 4.0, .2, .8], [.6, 4.2, -.2, .85]]) {
        const b = new THREE.Mesh(new THREE.SphereGeometry(r * s, 10, 8), mat); b.position.set(dx * s, dy * s, dz * s); g.add(b);
      }
    }
    function tree(x, z) {
      const g = new THREE.Group();
      const s = 0.8 + Math.random() * 0.9;             // size variety
      const r = Math.random();
      if (r < 0.5) pineTree(g, s); else if (r < 0.8) roundTree(g, s); else birchTree(g, s);
      g.position.set(x, 0, z); g.rotation.y = Math.random() * Math.PI * 2; scene.add(g);
    }
    for (let i = 0; i < 110; i++) {
      const x = (Math.random() * 2 - 1) * 80;
      const z = -6 - Math.random() * 90;             // only ahead of the player, never at spawn
      if (Math.abs(x) < 7) continue;                 // keep a wide clear corridor down the path
      if (Math.hypot(x - GLADE.x, z - GLADE.z) < 9) continue;   // keep glade 1 clear
      if (Math.hypot(x - GLADE2.x, z - GLADE2.z) < 7) continue;  // keep glade 2 clear
      if (Math.hypot(x - GLADE3.x, z - GLADE3.z) < 7) continue;  // keep glade 3 clear
      if (Math.hypot(x - GLADE4.x, z - GLADE4.z) < 7) continue;  // keep glade 4 clear
      if (Math.hypot(x - GLADE5.x, z - GLADE5.z) < 7) continue;
      if (Math.hypot(x - GLADE6.x, z - GLADE6.z) < 7) continue;
      if (Math.hypot(x - GLADE7.x, z - GLADE7.z) < 7) continue;
      if (Math.hypot(x - GLADE8.x, z - GLADE8.z) < 7) continue;
      if (Math.hypot(x - GLADE9.x, z - GLADE9.z) < 7) continue;
      if (Math.hypot(x - GLADE10.x, z - GLADE10.z) < 7) continue;
      if (Math.hypot(x - GLADE11.x, z - GLADE11.z) < 7) continue;
      if (Math.hypot(x - GLADE12.x, z - GLADE12.z) < 7) continue;
      tree(x, z);
    }

    // ---- ground detail: mushrooms, rocks, wildflowers (may line the path, never on it) ----
    function clearSpot(x, z, pad) {
      if (Math.abs(x) < 3 && z < 3) return false;                       // off the path itself
      if (Math.hypot(x - GLADE.x, z - GLADE.z) < pad) return false;
      if (Math.hypot(x - GLADE2.x, z - GLADE2.z) < pad) return false;
      if (Math.hypot(x - GLADE3.x, z - GLADE3.z) < pad) return false;
      if (Math.hypot(x - GLADE4.x, z - GLADE4.z) < pad) return false;
      if (Math.hypot(x - GLADE5.x, z - GLADE5.z) < pad) return false;
      if (Math.hypot(x - GLADE6.x, z - GLADE6.z) < pad) return false;
      if (Math.hypot(x - GLADE7.x, z - GLADE7.z) < pad) return false;
      if (Math.hypot(x - GLADE8.x, z - GLADE8.z) < pad) return false;
      if (Math.hypot(x - GLADE9.x, z - GLADE9.z) < pad) return false;
      if (Math.hypot(x - GLADE10.x, z - GLADE10.z) < pad) return false;
      if (Math.hypot(x - GLADE11.x, z - GLADE11.z) < pad) return false;
      if (Math.hypot(x - GLADE12.x, z - GLADE12.z) < pad) return false;
      return true;
    }
    function mushroom(x, z, s) {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.08 * s, 0.11 * s, 0.5 * s, 8), new THREE.MeshStandardMaterial({ color: 0xf3ede0, roughness: .9 }));
      stem.position.y = 0.25 * s; g.add(stem);
      const cap = new THREE.Mesh(new THREE.SphereGeometry(0.32 * s, 14, 10, 0, Math.PI * 2, 0, Math.PI / 2), new THREE.MeshStandardMaterial({ color: pick([0xd64545, 0xe07a3a, 0xc23b6b, 0xe0b13a]), roughness: .7 }));
      cap.scale.y = 0.7; cap.position.y = 0.5 * s; g.add(cap);
      const dot = new THREE.MeshStandardMaterial({ color: 0xffffff });
      for (let k = 0; k < 5; k++) { const a = Math.random() * 6.28, rr = Math.random() * 0.22 * s; const d = new THREE.Mesh(new THREE.SphereGeometry(0.04 * s, 6, 6), dot); d.position.set(Math.cos(a) * rr, 0.52 * s, Math.sin(a) * rr); g.add(d); }
      g.position.set(x, 0, z); scene.add(g);
    }
    function rock(x, z, s) {
      const m = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), new THREE.MeshStandardMaterial({ color: pick([0x8a8f96, 0x767b82, 0x9aa0a6]), roughness: 1, flatShading: true }));
      m.position.set(x, s * 0.45, z); m.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3); m.scale.set(1, 0.7 + Math.random() * 0.4, 1); scene.add(m);
    }
    function flower(x, z) {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4, 5), new THREE.MeshStandardMaterial({ color: 0x4a8a3a })); stem.position.y = 0.2; g.add(stem);
      const petalMat = new THREE.MeshStandardMaterial({ color: pick([0xff6b9d, 0xffe14d, 0xa78bfa, 0xffffff, 0xff9b54]) });
      for (let k = 0; k < 5; k++) { const p = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), petalMat); const a = k / 5 * 6.28; p.position.set(Math.cos(a) * 0.1, 0.42, Math.sin(a) * 0.1); g.add(p); }
      const c = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), new THREE.MeshStandardMaterial({ color: 0xffe14d })); c.position.y = 0.42; g.add(c);
      g.position.set(x, 0, z); g.scale.setScalar(0.8 + Math.random() * 0.6); scene.add(g);
    }
    for (let i = 0; i < 42; i++) { const x = (Math.random() * 2 - 1) * 55, z = -5 - Math.random() * 80; if (clearSpot(x, z, 5)) mushroom(x, z, 0.7 + Math.random() * 0.8); }
    for (let i = 0; i < 36; i++) { const x = (Math.random() * 2 - 1) * 60, z = -5 - Math.random() * 85; if (clearSpot(x, z, 5)) rock(x, z, 0.5 + Math.random() * 1.4); }
    for (let i = 0; i < 70; i++) { const x = (Math.random() * 2 - 1) * 50, z = -4 - Math.random() * 70; if (clearSpot(x, z, 4)) flower(x, z); }

    // ---- the open glade: a glowing portal + the axolotl greeter ----
    const portal = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0xff6b9d })     // pink — pops against teal, matches the axolotl
    );
    portal.position.set(GLADE.x, 3, GLADE.z); scene.add(portal);
    // glade 2 portal (purple — the j & k squishy glade)
    const portal2 = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0xa78bfa })
    );
    portal2.position.set(GLADE2.x, 3, GLADE2.z); scene.add(portal2);
    // glade 3 portal (teal — the d & f fidget glade)
    const portal3 = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0x2dd4bf })
    );
    portal3.position.set(GLADE3.x, 3, GLADE3.z); scene.add(portal3);
    // glade 4 portal (gold — the earring studio) + a spinning gem that dangles like an earring
    const portal4 = new THREE.Mesh(
      new THREE.TorusGeometry(3.2, 0.5, 16, 48),
      new THREE.MeshBasicMaterial({ color: 0xffd23f })
    );
    portal4.position.set(GLADE4.x, 3, GLADE4.z); scene.add(portal4);
    const gem = new THREE.Mesh(
      new THREE.OctahedronGeometry(1.1, 0),
      new THREE.MeshStandardMaterial({ color: 0xff8fc0, emissive: 0xff6b9d, emissiveIntensity: .45, roughness: .15, metalness: .6, flatShading: true })
    );
    gem.position.set(GLADE4.x, 3, GLADE4.z + 0.2); scene.add(gem);
    // glade 5 portal (lilac — the snail spa) + a proper little snail, side-on
    const portal5 = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.5, 16, 48), new THREE.MeshBasicMaterial({ color: 0xa78bfa }));
    portal5.position.set(GLADE5.x, 3, GLADE5.z); scene.add(portal5);
    function makeLilSnail() {
      const g = new THREE.Group();
      const cream = new THREE.MeshStandardMaterial({ color: 0xffe3b8, roughness: .85 });
      const dark  = new THREE.MeshStandardMaterial({ color: 0x2a1133 });
      const white = new THREE.MeshStandardMaterial({ color: 0xffffff });
      // body: a soft foot lying along X, head rising at the front
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.5, 6, 14), cream);
      body.rotation.z = Math.PI / 2; body.position.set(0.15, 0.3, 0); body.scale.y = 0.8; g.add(body);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12), cream);
      head.position.set(1.05, 0.62, 0); g.add(head);
      // eye stalks with big friendly eyes
      const stalks = [];
      [[0.35, 0.88], [-0.35, 1.2]].forEach(([tilt, x]) => {   // tops lean APART, eyes well separated
        const st = new THREE.Group();
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.055, 0.55, 8), cream);
        stem.position.y = 0.27; st.add(stem);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 10), dark);
        eye.position.y = 0.58; st.add(eye);
        const hi = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), white);
        hi.position.set(0.04, 0.62, 0.1); st.add(hi);
        st.position.set(x, 0.78, 0); st.rotation.z = tilt;
        st.userData.baseZ = st.rotation.z; stalks.push(st); g.add(st);
      });
      // smile + blush on the player-facing side
      const smile = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.022, 8, 16, Math.PI), dark);
      smile.position.set(1.16, 0.46, 0.24); smile.rotation.z = Math.PI; g.add(smile);
      const blush = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), new THREE.MeshStandardMaterial({ color: 0xff9ec4 }));
      blush.position.set(0.92, 0.55, 0.26); blush.scale.y = 0.6; g.add(blush);
      // the shell: a flattened dome with a real winding spiral of shrinking tori
      const shellBack = new THREE.Mesh(new THREE.SphereGeometry(0.62, 18, 14), new THREE.MeshStandardMaterial({ color: 0xdbb27f, roughness: .7 }));
      shellBack.scale.z = 0.5; shellBack.position.set(-0.35, 0.85, 0); g.add(shellBack);
      [[0.5, 0.15, 0xcfa06a, 0.06], [0.3, 0.12, 0xe8c79b, 0.2], [0.14, 0.09, 0xa9764a, 0.32]].forEach(([r, tube, col, zoff]) => {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(r, tube, 10, 28),
          new THREE.MeshStandardMaterial({ color: col, roughness: .7 }));
        ring.position.set(-0.35 + zoff * 0.3, 0.85 - zoff * 0.15, zoff); g.add(ring);
      });
      g.userData.stalks = stalks;
      return g;
    }
    const lilSnail = makeLilSnail();
    lilSnail.scale.setScalar(1.15);
    lilSnail.position.set(GLADE5.x, 2.1, GLADE5.z + 0.2); scene.add(lilSnail);
    // glade 6 portal (green — the ant parade) + three little ants in a row
    const portal6 = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.5, 16, 48), new THREE.MeshBasicMaterial({ color: 0x4ade80 }));
    portal6.position.set(GLADE6.x, 3, GLADE6.z); scene.add(portal6);
    const antRow = new THREE.Group();
    function lilAnt(hatKind) {
      const g = new THREE.Group();
      const brown = new THREE.MeshStandardMaterial({ color: 0x7a4a26, roughness: .8 });
      const dk    = new THREE.MeshStandardMaterial({ color: 0x2a1133 });
      const wh    = new THREE.MeshStandardMaterial({ color: 0xffffff });
      // three-part body along X: abdomen, thorax, head
      const abd = new THREE.Mesh(new THREE.SphereGeometry(0.26, 14, 10), brown);
      abd.position.set(-0.36, 0.02, 0); abd.scale.set(1.25, 1, 1); g.add(abd);
      const tho = new THREE.Mesh(new THREE.SphereGeometry(0.17, 12, 10), brown); g.add(tho);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 14, 10), brown);
      head.position.set(0.32, 0.08, 0); g.add(head);
      // big friendly eyes (both sides — it's seen side-on)
      [[0.16], [-0.16]].forEach(([z]) => {
        const e = new THREE.Mesh(new THREE.SphereGeometry(0.065, 10, 8), wh); e.position.set(0.44, 0.14, z); g.add(e);
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 6), dk); p.position.set(0.49, 0.14, z * 1.05); g.add(p);
      });
      // six little legs
      for (const s of [-1, 1]) for (let k = 0; k < 3; k++) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.32, 6), dk);
        leg.position.set(-0.28 + k * 0.24, -0.17, s * 0.14);
        leg.rotation.x = s * 0.55; leg.rotation.z = (k - 1) * 0.35; g.add(leg);
      }
      // antennae with bobble tips
      for (const s of [-1, 1]) {
        const an = new THREE.Mesh(new THREE.CylinderGeometry(0.016, 0.016, 0.3, 6), dk);
        an.position.set(0.44, 0.34, s * 0.08); an.rotation.z = -0.55; an.rotation.x = s * 0.3; g.add(an);
        const tip = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), dk);
        tip.position.set(0.53, 0.46, s * 0.12); g.add(tip);
      }
      // and, importantly, a tiny hat
      if (hatKind === 0) {          // top hat
        const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.025, 14), dk);
        brim.position.set(0.3, 0.29, 0); g.add(brim);
        const top = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.13, 0.24, 12), dk);
        top.position.set(0.3, 0.42, 0); g.add(top);
      } else if (hatKind === 1) {   // red cap
        const capM = new THREE.MeshStandardMaterial({ color: 0xd64545, roughness: .7 });
        const dome = new THREE.Mesh(new THREE.SphereGeometry(0.17, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2), capM);
        dome.position.set(0.3, 0.27, 0); g.add(dome);
        const peak = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.14, 0.025, 10), capM);
        peak.position.set(0.44, 0.29, 0); g.add(peak);
      } else {                      // gold crown
        const gold = new THREE.MeshStandardMaterial({ color: 0xffd23f, roughness: .4, metalness: .4 });
        const band = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.11, 10), gold);
        band.position.set(0.3, 0.33, 0); g.add(band);
        for (let k = 0; k < 3; k++) { const p = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), gold);
          p.position.set(0.3 + (k - 1) * 0.085, 0.42, 0); g.add(p); }
      }

      const g = new THREE.Group(); const tan = new THREE.MeshStandardMaterial({ color: 0xb07a4a, roughness: .95 }); const dark = new THREE.MeshStandardMaterial({ color: 0x6b4a2a });
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.45, 1.0, 6, 10), tan); body.rotation.z = Math.PI / 2; body.position.y = 1.5; g.add(body);
      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 1.0, 8), tan); neck.position.set(0, 2.1, 0.7); neck.rotation.x = -0.5; g.add(neck);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 10), tan); head.scale.set(1, 1, 1.5); head.position.set(0, 2.55, 1.05); g.add(head);
      for (const s of [-1, 1]) for (const dz of [0.5, -0.5]) { const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 1.5, 6), dark); leg.position.set(0.28 * s, 0.75, dz); g.add(leg); }
      for (const s of [-1, 1]) { const a = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.6, 5), dark); a.position.set(0.12 * s, 2.95, 1.0); a.rotation.z = s * 0.4; g.add(a); }
      g.position.set(x, 0, z); g.rotation.y = Math.random() * 6.28; scene.add(g);
    }
    function fox(x, z) {
      const g = new THREE.Group(); const orange = new THREE.MeshStandardMaterial({ color: 0xd9762e, roughness: .9 }); const white = new THREE.MeshStandardMaterial({ color: 0xf3ede0 }); const dark = new THREE.MeshStandardMaterial({ color: 0x2a1a12 });
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.8, 6, 10), orange); body.rotation.z = Math.PI / 2; body.position.y = 0.7; g.add(body);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 10), orange); head.scale.set(1, 1, 1.1); head.position.set(0, 0.95, 0.6); g.add(head);
      const snout = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.35, 8), white); snout.rotation.x = Math.PI / 2; snout.position.set(0, 0.88, 0.95); g.add(snout);
      for (const s of [-1, 1]) { const ear = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.3, 5), orange); ear.position.set(0.16 * s, 1.25, 0.55); g.add(ear); }
      for (const s of [-1, 1]) for (const dz of [0.35, -0.35]) { const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.7, 6), dark); leg.position.set(0.18 * s, 0.35, dz); g.add(leg); }
      const tail = new THREE.Mesh(new THREE.ConeGeometry(0.22, 1.0, 8), orange); tail.rotation.x = -2.2; tail.position.set(0, 0.85, -0.7); g.add(tail);
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8), white); tip.position.set(0, 1.05, -1.05); g.add(tip);
      for (const s of [-1, 1]) { const e = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), dark); e.position.set(0.12 * s, 1.0, 0.85); g.add(e); }
      g.position.set(x, 0, z); g.rotation.y = Math.random() * 6.28; scene.add(g);
    }
    const birds = [];
    function bird(cx, cz, radius, y, phase) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshStandardMaterial({ color: 0x444a55 })); body.scale.set(1, 0.8, 1.5); g.add(body);
      const wingMat = new THREE.MeshStandardMaterial({ color: 0x5a626e, side: THREE.DoubleSide });
      const wings = [];
      for (const s of [-1, 1]) { const w = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.25), wingMat); w.position.x = 0.3 * s; g.add(w); wings.push(w); }
      g.userData = { cx, cz, radius, y, phase, wings }; scene.add(g); birds.push(g);
    }
    rabbit(-8, -10); rabbit(9, -8); rabbit(-13, -24);
    deer(-23, -30); deer(21, -37);
    fox(15, -19); fox(-18, -13);
    for (let i = 0; i < 5; i++) bird((Math.random() * 2 - 1) * 20, -25 - Math.random() * 30, 6 + Math.random() * 8, 9 + Math.random() * 6, Math.random() * 6.28);

    // (locked teaser gates removed — real portals arrive with each new arc instead)

    // ---- first-person controls ----
    const controls = new PointerLockControls(camera, renderer.domElement);
    const startEl = document.getElementById('start'), dot = document.getElementById('dot');
    startEl.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock',   () => { startEl.style.display = 'none'; dot.style.display = 'block'; });
    controls.addEventListener('unlock', () => { if (FROM) return; startEl.style.display = 'flex'; dot.style.display = 'none'; });
    if (FROM) {
      // back from a station: no gate — world is live immediately, keys walk right away;
      // the browser needs one click before it hands over the mouse for looking around
      startEl.style.display = 'none'; dot.style.display = 'block';
      renderer.domElement.addEventListener('click', () => { if (!controls.isLocked) controls.lock(); });
    }

    const keys = {};
    addEventListener('keydown', e => keys[e.code] = true);
    addEventListener('keyup',   e => keys[e.code] = false);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    let entered = false;
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);
      if (controls.isLocked || FROM) {
        const v = 7 * dt;
        if (keys.KeyW || keys.ArrowUp)    controls.moveForward(v);
        if (keys.KeyS || keys.ArrowDown)  controls.moveForward(-v);
        if (keys.KeyA || keys.ArrowLeft)  controls.moveRight(-v);
        if (keys.KeyD || keys.ArrowRight) controls.moveRight(v);
        camera.position.x = Math.max(-90, Math.min(90, camera.position.x));
        camera.position.z = Math.max(-95, Math.min(95, camera.position.z));
        // walked into the glade → start the typing lesson
        const d = Math.hypot(camera.position.x - GLADE.x, camera.position.z - GLADE.z);
        if (!entered && d < 3.2) { entered = true; location.href = 'name.html'; }
        const d2 = Math.hypot(camera.position.x - GLADE2.x, camera.position.z - GLADE2.z);
        if (!entered && d2 < 3.2) { entered = true; location.href = 'jk.html'; }
        const d3 = Math.hypot(camera.position.x - GLADE3.x, camera.position.z - GLADE3.z);
        if (!entered && d3 < 3.2) { entered = true; location.href = 'df.html'; }
        const d4 = Math.hypot(camera.position.x - GLADE4.x, camera.position.z - GLADE4.z);
        if (!entered && d4 < 3.2) { entered = true; location.href = 'earrings.html'; }
        const d5 = Math.hypot(camera.position.x - GLADE5.x, camera.position.z - GLADE5.z);
        if (!entered && d5 < 3.2) { entered = true; location.href = 'snail.html'; }
        const d6 = Math.hypot(camera.position.x - GLADE6.x, camera.position.z - GLADE6.z);
        if (!entered && d6 < 3.2) { entered = true; location.href = 'ants.html'; }
        const d7 = Math.hypot(camera.position.x - GLADE7.x, camera.position.z - GLADE7.z);
        if (!entered && d7 < 3.2) { entered = true; location.href = 'wink.html'; }
        const d8 = Math.hypot(camera.position.x - GLADE8.x, camera.position.z - GLADE8.z);
        if (!entered && d8 < 3.2) { entered = true; location.href = 'butterfly.html'; }
        if (arcOpen) {                             // Arc-2 portals only work once the gate is gold
          const d9 = Math.hypot(camera.position.x - GLADE9.x, camera.position.z - GLADE9.z);
          if (!entered && d9 < 3.2) { entered = true; location.href = 'braid.html'; }
          const d10 = Math.hypot(camera.position.x - GLADE10.x, camera.position.z - GLADE10.z);
          if (!entered && d10 < 3.2) { entered = true; location.href = 'juggle.html'; }
          const d11 = Math.hypot(camera.position.x - GLADE11.x, camera.position.z - GLADE11.z);
          if (!entered && d11 < 3.2) { entered = true; location.href = 'giraffe.html'; }
          const d12 = Math.hypot(camera.position.x - GLADE12.x, camera.position.z - GLADE12.z);
          if (!entered && d12 < 3.2) { entered = true; location.href = 'tightrope.html'; }
        }
      }
      gem.rotation.y += dt * 1.2;                                         // the gem twirls like a dangly earring
      gem.position.y = 3 + Math.sin(clock.elapsedTime * 1.7 + 3) * 0.25;
      lilSnail.rotation.y = Math.atan2(camera.position.x - GLADE5.x, camera.position.z - GLADE5.z);  // show its side
      lilSnail.position.y = 2.1 + Math.sin(clock.elapsedTime * 1.4 + 1) * 0.18;
      for (const st of lilSnail.userData.stalks)                          // eye stalks waggle gently
        st.rotation.z = st.userData.baseZ + Math.sin(clock.elapsedTime * 2.1 + st.userData.baseZ * 9) * 0.1;
      antRow.position.y = 2.6 + Math.sin(clock.elapsedTime * 2.2) * 0.12; // the row drifts...
      for (const a of antRow.children)                                    // ...and each ant marches
        a.position.y = Math.abs(Math.sin(clock.elapsedTime * 3 + a.userData.phase)) * 0.14;
      antRow.rotation.y = Math.atan2(camera.position.x - GLADE6.x, camera.position.z - GLADE6.z) + Math.PI / 2;
      winkFace.rotation.y = Math.atan2(camera.position.x - GLADE7.x, camera.position.z - GLADE7.z);  // face the player
      winkFace.position.y = 3 + Math.sin(clock.elapsedTime * 1.6 + 2) * 0.18;
      const fl = Math.sin(clock.elapsedTime * 5) * 0.55;                  // wings flap from the body
      wingL.rotation.y = fl; wingR.rotation.y = -fl;
      for (let i = 0; i < gradStars.length; i++) {                        // graduation stars twirl
        gradStars[i].rotation.y += dt * 1.5;
        gradStars[i].position.y = 7.4 + Math.sin(clock.elapsedTime * 1.6 + i) * 0.18;
      }
      if (bowG) { bowG.rotation.y += dt * 1.1; bowG.position.y = 3 + Math.sin(clock.elapsedTime * 1.5 + 1) * 0.2; }
      if (juggleG) { juggleG.rotation.z += dt * 1.8; juggleG.position.y = 3 + Math.sin(clock.elapsedTime * 1.7 + 2) * 0.2; }
      if (girG) { girG.rotation.y = Math.atan2(camera.position.x - GLADE11.x, camera.position.z - GLADE11.z);
        girG.position.y = 2.6 + Math.sin(clock.elapsedTime * 1.4 + 3) * 0.18; }
      if (tightG) { tightG.rotation.y += dt * 0.9; tightG.position.y = 3 + Math.sin(clock.elapsedTime * 1.6 + 4) * 0.2; }
      bfly.rotation.y = Math.atan2(camera.position.x - GLADE8.x, camera.position.z - GLADE8.z);
      bfly.position.y = 3 + Math.sin(clock.elapsedTime * 2.4 + 4) * 0.3;
      axo.rotation.y = Math.atan2(camera.position.x - GLADE.x, camera.position.z - GLADE.z);  // face the player
      axo.position.y = 1.9 + Math.sin(clock.elapsedTime * 1.6) * 0.12;    // gentle bob
      for (const gl of axo.userData.gills)                                // feathery gills sway underwater
        gl.rotation.x = gl.userData.baseX + Math.sin(clock.elapsedTime * 2 + gl.userData.phase) * 0.14;
      // Stitch (j/k glade) — face player + bob
      stitch.rotation.y = Math.atan2(camera.position.x - GLADE2.x, camera.position.z - GLADE2.z);
      stitch.position.y = 1.3 + Math.sin(clock.elapsedTime * 1.5 + 1) * 0.1;
      // little axolotl (d/f glade) — face player, bob, gills sway
      lilAxo.rotation.y = Math.atan2(camera.position.x - GLADE3.x, camera.position.z - GLADE3.z);
      lilAxo.position.y = 1.5 + Math.sin(clock.elapsedTime * 1.8 + 2) * 0.1;
      for (const gl of lilAxo.userData.gills)
        gl.rotation.x = gl.userData.baseX + Math.sin(clock.elapsedTime * 2.2 + gl.userData.phase) * 0.14;
      portal.scale.setScalar(1 + Math.sin(clock.elapsedTime * 2) * 0.04); // gentle pulse
      portal.rotation.z += dt * 0.3;
      // clouds drift slowly across and wrap around
      for (const c of clouds) { c.position.x += dt * 0.6; if (c.position.x > 85) c.position.x = -85; }
      // birds circle overhead, banking into the turn, wings flapping
      for (const b of birds) {
        const u = b.userData, a = clock.elapsedTime * 0.5 + u.phase;
        b.position.set(u.cx + Math.cos(a) * u.radius, u.y + Math.sin(clock.elapsedTime + u.phase) * 0.4, u.cz + Math.sin(a) * u.radius);
        b.rotation.y = -a + Math.PI / 2;
        const flap = Math.sin(clock.elapsedTime * 8 + u.phase) * 0.5;
        u.wings[0].rotation.z = 0.3 + flap; u.wings[1].rotation.z = -0.3 - flap;
      }
      // sunbeams shimmer; stream glints
      for (const bm of beams) bm.material.opacity = bm.userData.base * (0.7 + Math.sin(clock.elapsedTime * 1.3 + bm.position.x) * 0.3);
      streamMat.emissiveIntensity = 0.3 + Math.sin(clock.elapsedTime * 2) * 0.15;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
