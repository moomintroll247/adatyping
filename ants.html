<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ant parade</title>
  <style>
    :root { --green:#16a34a; --green-deep:#166534; --green-bright:#86efac; --cream:#fdfdfb; --gold:#ffd23f; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; overflow:hidden; }
    body { background:linear-gradient(160deg,#14532d,#16a34a 55%,#4ade80);
           font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
    #bg { position:fixed; inset:0; overflow:hidden; z-index:0; }
    .leaf { position:absolute; top:-12vh; font-size:5vmin; animation:fall linear infinite; }
    @keyframes fall { 0%{transform:translateY(0) rotate(0); opacity:0} 10%{opacity:.8} 90%{opacity:.8}
      100%{transform:translateY(120vh) translateX(var(--drift,0)) rotate(340deg); opacity:0} }
    #squish { position:fixed; inset:0; z-index:40; pointer-events:none; }
    #toforest { position:fixed; top:2.5vh; left:2.5vw; z-index:60; width:13vmin; height:13vmin; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:7vmin; text-decoration:none;
      background:rgba(255,255,255,.2); border:.5vmin solid rgba(255,255,255,.5); }
    #ver { position:fixed; right:8px; bottom:6px; z-index:100; font:13px/1 ui-monospace,monospace; color:rgba(255,255,255,.6); }
    #stage { position:relative; z-index:10; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.5vh; }

    /* ---- the parade ground ---- */
    #parade { position:relative; width:86vmin; height:20vmin; }
    #ground { position:absolute; bottom:0; width:100%; height:1.6vmin; border-radius:.8vmin; background:rgba(0,0,0,.25); }
    .ant { position:absolute; bottom:1.2vmin; font-size:8vmin; line-height:1; left:-14vmin;
      transition:left .8s cubic-bezier(.3,1,.5,1); animation:march .35s ease-in-out 3; }
    @keyframes march { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-1.6vmin) rotate(-6deg)} }
    .ant .hat { position:absolute; top:-4.6vmin; left:1.2vmin; font-size:5vmin; transform:rotate(-12deg); }
    .ant.flip { animation:flip .9s cubic-bezier(.4,1.2,.5,1); }
    @keyframes flip { 0%{transform:translateY(0) rotate(0)} 40%{transform:translateY(-9vmin) rotate(200deg)}
      75%{transform:translateY(-1vmin) rotate(345deg)} 100%{transform:translateY(0) rotate(360deg)} }
    .ant.bop { animation:bop .5s ease-in-out infinite; }
    @keyframes bop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2vmin)} }

    #key { width:24vmin; height:24vmin; border-radius:26px; background:var(--cream);
      display:flex; align-items:center; justify-content:center; font-size:15vmin; font-weight:800; color:var(--green-deep);
      box-shadow:0 1.2vmin 0 rgba(0,0,0,.18), inset 0 0 0 .8vmin var(--green-bright); }
    #key.nope { animation:nope .35s; }
    @keyframes nope { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2vmin)} 75%{transform:translateX(2vmin)} }

    #hand { position:relative; width:42vmin; height:30vmin; transform:scaleX(-1); }  /* LEFT hand (mirror) */
    .palm { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:28vmin; height:15vmin;
      background:#f6c79a; border-radius:5vmin 5vmin 4vmin 4vmin; }
    .finger { position:absolute; bottom:12vmin; width:4.6vmin; background:#f6c79a; border-radius:2.3vmin 2.3vmin 1.2vmin 1.2vmin; transition:transform .1s; }
    .thumb { bottom:4vmin; left:6vmin; width:4.8vmin; height:11vmin; transform:rotate(-50deg); transform-origin:bottom center; background:#f0bd8f; }
    .f-index  { left:9vmin;  height:19vmin; }
    .f-middle { left:15vmin; height:23vmin; }
    .f-ring   { left:21vmin; height:19vmin; }
    .f-pinky  { left:27vmin; height:14vmin; width:4vmin; }
    .finger.active { background:var(--gold); box-shadow:0 0 5vmin 1vmin rgba(255,210,63,.7); animation:wig 1.4s ease-in-out infinite; }
    @keyframes wig { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1vmin)} }
    .finger.tap { transform:translateY(2.5vmin) scaleY(.9); }
    #pips { display:flex; align-items:center; }
    .pip { border-radius:50%; background:rgba(255,255,255,.18); border:.4vmin solid rgba(255,255,255,.5); }
    .pip.on { animation:pippop .35s cubic-bezier(.2,1.5,.4,1) forwards; }
    @keyframes pippop { 0%{transform:scale(.4)} 100%{transform:scale(1)} }
  </style>
</head>
<body>
  <div id="bg"></div>
  <a id="toforest" href="index.html?from=deep" aria-label="forest">🌲</a>
  <canvas id="squish"></canvas>
  <main id="stage">
    <div id="parade"><div id="ground"></div></div>
    <div id="pips"></div>
    <div id="key">a</div>
    <div id="hand"></div>
  </main>
  <div id="ver">ants v3</div>

  <script src="hand.js?v=2"></script>
  <script>
    buildHand(document.getElementById('hand'), {cuff:'#166534'});
    document.querySelector('#hand .f-pinky').classList.add('active');
    // The smallest finger marches the smallest animals: every a brings on one more
    // ant in a tiny hat. A full row = the marching band plays; the last ant backflips.
    const STAGES = [4, 6, 8];
    const HATS = ['🎩','👒','🧢','👑','🎓','🎀','⛑️','🪖'];
    let stage = 0, idx = 0, busy = false;
    const keyEl = document.getElementById('key'), parade = document.getElementById('parade'),
          handEl = document.getElementById('hand');

    (function(){ const bg=document.getElementById('bg');
      const L=['🍃','🍂','🍃','🌿'];
      for(let i=0;i<10;i++){ const l=document.createElement('div'); l.className='leaf';
        l.textContent=L[i%L.length]; l.style.left=Math.random()*100+'vw';
        l.style.setProperty('--drift',(Math.random()*24-12)+'vw'); l.style.animationDuration=(9+Math.random()*10)+'s';
        l.style.animationDelay=(-Math.random()*15)+'s'; bg.appendChild(l);} })();

    function slotX(i, n){ return (6 + i * (78 / Math.max(n-1,1))) + 'vmin'; }
    const pipsEl = document.getElementById('pips');
    function buildPips(n){ pipsEl.innerHTML=''; const sz=Math.min(5, 60/n); pipsEl.style.gap=Math.min(2, 14/n)+'vmin';
      for(let i=0;i<n;i++){ const p=document.createElement('div'); p.className='pip'; p.style.width=p.style.height=sz+'vmin'; pipsEl.appendChild(p);} }
    function markPip(i){ const p=pipsEl.children[i]; if(p){ p.classList.add('on'); p.style.background=COLS[i%COLS.length]; p.style.borderColor='rgba(255,255,255,.8)'; } }
    function renderStage(){ parade.querySelectorAll('.ant').forEach(e=>e.remove()); idx = 0; buildPips(STAGES[stage]); }
    function press(){
      const n = STAGES[stage];
      const fin = handEl.querySelector('.f-pinky');
      fin.classList.add('tap'); setTimeout(()=>fin.classList.remove('tap'),120);
      const myIdx = idx;                                   // snapshot before idx moves on
      const a = document.createElement('div'); a.className='ant'; a.textContent='🐜';
      const h = document.createElement('div'); h.className='hat'; h.textContent=HATS[myIdx % HATS.length];
      a.appendChild(h); parade.appendChild(a);
      void a.offsetWidth;                                  // commit the off-screen start...
      a.style.left = slotX(myIdx, n);                      // ...then march to its spot
      toot(myIdx); markPip(myIdx);
      idx++;
      if(idx >= n){ busy = true; setTimeout(fanfare, 850); setTimeout(next, 3000); }
    }
    function fanfare(){
      const ants=[...parade.querySelectorAll('.ant')];
      ants.forEach((a,i)=>{ if(i<ants.length-1){ a.classList.add('bop'); a.style.animationDelay=(i*0.09)+'s'; } });
      const last=ants[ants.length-1]; if(last){ last.classList.remove('flip'); void last.offsetWidth; last.classList.add('flip'); }
      bugle(); squishBurst();
      setTimeout(()=>ants.forEach(a=>a.classList.remove('bop')), 1900);
    }
    function next(){ stage = (stage + 1) % STAGES.length; renderStage(); busy = false; }

    addEventListener('keydown',(e)=>{
      if(busy || e.key.length!==1) return;
      if(e.key.toLowerCase()==='a') press();
      else { keyEl.classList.remove('nope'); void keyEl.offsetWidth; keyEl.classList.add('nope'); }
    });

    let actx=null;
    function ac(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
    const SCALE=[1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8, 2];
    function note(freq, t, vol, len, type){
      const c=ac(), o=c.createOscillator(), g=c.createGain(); o.type=type||'triangle'; o.frequency.value=freq;
      g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+len);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t+len+.05);
    }
    function toot(n){ note(262 * SCALE[n%8] * Math.pow(2,Math.floor(n/8)), ac().currentTime, .35, .35, 'square'); }  // little brass toot
    function bugle(){                                  // wobbly marching-band fanfare
      const c=ac(), t=c.currentTime;
      const tune=[262,330,392,523,392,523];
      tune.forEach((f,k)=>note(f, t+k*0.16, .3, .3, 'square'));
      [262,330,392,523].forEach((f,k)=>note(f, t+1.1+k*0.012, .18, 1.4, 'triangle'));   // closing chord
    }

    const cv=document.getElementById('squish'), cx=cv.getContext('2d');
    function fit(){ cv.width=innerWidth; cv.height=innerHeight; }
    addEventListener('resize',fit); fit();
    const COLS=['#4ade80','#86efac','#ffd23f','#ff8fc0','#fbbf24','#a78bfa','#5eead4'];
    let squishes=[], raf=null;
    const G=0.75, REST=0.5;
    function squishBurst(){
      const cxp=innerWidth/2, cyp=innerHeight*0.45;
      const KINDS=['cube','circle','sausage'], DECOS=['none','none','dots','face'];
      for(let i=0;i<30;i++){
        const deco=DECOS[(Math.random()*DECOS.length)|0], dots=[];
        if(deco==='dots') for(let k=0;k<4;k++) dots.push({x:(Math.random()-.5)*1.2, y:(Math.random()-.5)*1.2});
        squishes.push({
          x:cxp+(Math.random()-.5)*100, y:cyp+(Math.random()-.5)*60,
          vx:(Math.random()-.5)*20, vy:-Math.random()*12-3,
          r:16+Math.random()*16, c:COLS[(Math.random()*COLS.length)|0], squash:1, born:performance.now(),
          kind:KINDS[(Math.random()*KINDS.length)|0], deco, dots });
      }
      if(squishes.length>80) squishes.splice(0, squishes.length-80);
      if(!raf) loop();
    }
    function loop(){
      cx.clearRect(0,0,cv.width,cv.height);
      const nowT=performance.now();                        // celebrations melt away after a few seconds
      squishes=squishes.filter(s=>{ if(nowT-s.born>5500) s.r*=0.90; return s.r>2; });
      if(!squishes.length){ raf=null; return; }
      for(const s of squishes){
        s.vy+=G; s.x+=s.vx; s.y+=s.vy;
        if(s.y+s.r>cv.height){ s.y=cv.height-s.r; if(s.vy>4)s.squash=.6; s.vy*=-REST; s.vx*=.94; if(Math.abs(s.vy)<1.2)s.vy=0; }
        if(s.x<s.r){ s.x=s.r; s.vx*=-REST; } if(s.x>cv.width-s.r){ s.x=cv.width-s.r; s.vx*=-REST; }
        s.squash+=(1-s.squash)*0.15;
      }
      for(let i=0;i<squishes.length;i++) for(let j=i+1;j<squishes.length;j++){
        const a=squishes[i], b=squishes[j]; let dx=b.x-a.x, dy=b.y-a.y; let d=Math.hypot(dx,dy)||0.001; const min=a.r+b.r;
        if(d<min){ const nx=dx/d, ny=dy/d, ov=(min-d)/2;
          a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
          const vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
          if(vn<0){ const imp=-(1+REST)*vn/2; a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny; }
        }
      }
      for(const s of squishes){
        cx.save(); cx.translate(s.x,s.y); cx.scale(2-s.squash, s.squash);
        cx.fillStyle=s.c;
        if(s.kind==='circle'){ cx.beginPath(); cx.arc(0,0,s.r,0,7); cx.fill(); }
        else if(s.kind==='sausage'){ roundRect(-s.r*1.3,-s.r*0.62,s.r*2.6,s.r*1.24,s.r*0.62); cx.fill(); }
        else { roundRect(-s.r,-s.r,s.r*2,s.r*2,s.r*0.5); cx.fill(); }
        if(s.deco==='dots'){ cx.fillStyle='rgba(255,255,255,.8)';
          for(const d of s.dots){ cx.beginPath(); cx.arc(d.x*s.r,d.y*s.r,s.r*0.16,0,7); cx.fill(); } }
        else if(s.deco==='face'){ cx.fillStyle='#2a1133';
          cx.beginPath(); cx.arc(-s.r*0.32,-s.r*0.12,s.r*0.13,0,7); cx.arc(s.r*0.32,-s.r*0.12,s.r*0.13,0,7); cx.fill();
          cx.beginPath(); cx.arc(0,s.r*0.05,s.r*0.32,0.15*Math.PI,0.85*Math.PI); cx.lineWidth=s.r*0.09; cx.strokeStyle='#2a1133'; cx.stroke(); }
        cx.restore();
      }
      raf=requestAnimationFrame(loop);
    }
    function roundRect(x,y,w,h,r){ cx.beginPath(); cx.moveTo(x+r,y);
      cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); }

    renderStage();
  </script>
</body>
</html>
