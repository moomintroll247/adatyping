<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>butterfly wings</title>
  <style>
    :root { --sky:#38bdf8; --sky-deep:#0369a1; --sky-bright:#bae6fd; --cream:#fdfdfb; --gold:#ffd23f; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; overflow:hidden; }
    body { background:linear-gradient(160deg,#0c4a6e,#0284c7 55%,#7dd3fc);
           font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
    #bg { position:fixed; inset:0; overflow:hidden; z-index:0; }
    .petal { position:absolute; top:-8vh; width:2.6vmin; height:1.8vmin; border-radius:50% 50% 50% 0;
      background:rgba(255,182,213,.85); animation:pfall linear infinite; }
    @keyframes pfall { 0%{transform:translateY(0) rotate(0); opacity:0} 8%{opacity:.9} 92%{opacity:.9}
      100%{transform:translateY(115vh) translateX(var(--drift,0)) rotate(320deg); opacity:0} }
    #squish { position:fixed; inset:0; z-index:40; pointer-events:none; }
    #toforest { position:fixed; top:2.5vh; left:2.5vw; z-index:60; width:13vmin; height:13vmin; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:7vmin; text-decoration:none;
      background:rgba(255,255,255,.2); border:.5vmin solid rgba(255,255,255,.5); }
    #ver { position:fixed; right:8px; bottom:6px; z-index:100; font:13px/1 ui-monospace,monospace; color:rgba(255,255,255,.6); }
    #stage { position:relative; z-index:10; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:2vh; padding-bottom:2vh; }

    /* ---- the sky: hedgehog waits at the top, butterfly climbs to it ---- */
    #sky { position:fixed; inset:0; z-index:8; pointer-events:none; }
    #perch { position:absolute; top:4vh; left:50%; transform:translateX(-50%); font-size:10vmin; line-height:1; }
    #flower { position:absolute; top:-4.5vmin; left:50%; transform:translateX(-50%) scale(0); font-size:6.5vmin; transition:transform .5s cubic-bezier(.2,1.5,.4,1); }
    #flower.bloom { transform:translateX(-50%) scale(1); }
    #fly { position:absolute; left:50%; bottom:38vh; transform:translateX(-50%); font-size:11vmin; line-height:1;
      transition:bottom .35s cubic-bezier(.3,1.2,.5,1); }
    #fly .b { display:inline-block; }
    #fly .b.flapL { animation:flapL .3s ease-out; } #fly .b.flapR { animation:flapR .3s ease-out; }
    @keyframes flapL { 0%{transform:rotate(0) scaleX(1)} 40%{transform:rotate(-22deg) scaleX(.72)} 100%{transform:rotate(0) scaleX(1)} }
    @keyframes flapR { 0%{transform:rotate(0) scaleX(1)} 40%{transform:rotate(22deg) scaleX(.72)} 100%{transform:rotate(0) scaleX(1)} }
    #fly.hover { animation:hover 2.2s ease-in-out infinite; }
    @keyframes hover { 0%,100%{margin-left:-1.5vmin} 50%{margin-left:1.5vmin} }

    #keys { display:flex; gap:6vmin; align-items:center; }
    .bigkey { width:20vmin; height:20vmin; border-radius:24px; background:var(--cream); opacity:.35; transition:opacity .2s, transform .2s;
      display:flex; align-items:center; justify-content:center; font-size:12vmin; font-weight:800; color:var(--sky-deep);
      box-shadow:0 1vmin 0 rgba(0,0,0,.18), inset 0 0 0 .7vmin var(--sky-bright); }
    .bigkey.want { opacity:1; transform:scale(1.12); box-shadow:0 1vmin 0 rgba(0,0,0,.18), inset 0 0 0 .7vmin var(--gold), 0 0 5vmin rgba(255,210,63,.55); }
    .bigkey.nope { animation:nope .35s; }
    @keyframes nope { 0%,100%{transform:translateX(0) scale(1.12)} 25%{transform:translateX(-2vmin) scale(1.12)} 75%{transform:translateX(2vmin) scale(1.12)} }

    /* ---- two little hands, pinkies take turns glowing ---- */
    #hands { display:flex; gap:10vmin; }
    .hand { position:relative; width:30vmin; height:22vmin; }
    .hand.left { transform:scaleX(-1); }
    .palm { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:20vmin; height:10.5vmin;
      background:#f6c79a; border-radius:3.5vmin 3.5vmin 3vmin 3vmin; }
    .finger { position:absolute; bottom:8.5vmin; width:3.2vmin; background:#f6c79a; border-radius:1.6vmin 1.6vmin .9vmin .9vmin; transition:transform .1s; }
    .thumb { bottom:3vmin; left:4vmin; width:3.4vmin; height:7.5vmin; transform:rotate(-50deg); transform-origin:bottom center; background:#f0bd8f; }
    .f-index  { left:6.5vmin;  height:13vmin; }
    .f-middle { left:10.7vmin; height:16vmin; }
    .f-ring   { left:14.9vmin; height:13vmin; }
    .f-pinky  { left:19.1vmin; height:10vmin; width:2.9vmin; }
    .finger.active { background:var(--gold); box-shadow:0 0 4vmin .8vmin rgba(255,210,63,.7); animation:wig 1.4s ease-in-out infinite; }
    @keyframes wig { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-.8vmin)} }
    .finger.tap { transform:translateY(1.8vmin) scaleY(.9); }
    #pips { display:flex; align-items:center; }
    .pip { border-radius:50%; background:rgba(255,255,255,.18); border:.4vmin solid rgba(255,255,255,.5); }
    .pip.on { animation:pippop .35s cubic-bezier(.2,1.5,.4,1) forwards; }
    @keyframes pippop { 0%{transform:scale(.4)} 100%{transform:scale(1)} }
    #pips { margin-bottom:3vh; }
    #deck { display:flex; align-items:flex-end; gap:14vmin; }
    .kcol { display:flex; flex-direction:column; align-items:center; gap:2.5vmin; }
    .hand { width:24vmin; height:30vmin; }
    #ticks { position:fixed; top:2.5vh; right:2.5vw; z-index:60; display:flex; gap:1.5vmin; }
    .tick { width:6.5vmin; height:6.5vmin; border-radius:50%; background:rgba(255,255,255,.15);
      border:.5vmin solid rgba(255,255,255,.5); display:flex; align-items:center; justify-content:center; font-size:4vmin; }
    .tick.done { background:rgba(255,210,63,.3); border-color:#ffd23f; }
    #grad { position:fixed; inset:0; z-index:55; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    #gradcup { font-size:32vmin; animation:gradpop 1s cubic-bezier(.2,1.4,.4,1), gradbob 2.2s ease-in-out 1s infinite;
      filter:drop-shadow(0 0 6vmin rgba(255,210,63,.8)); }
    @keyframes gradpop { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }
    @keyframes gradbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3vmin)} }
    #toforest.glow { border-color:#ffd23f; animation:tglow 1.2s ease-in-out infinite; }
    @keyframes tglow { 0%,100%{box-shadow:0 0 2vmin rgba(255,210,63,.5)} 50%{box-shadow:0 0 7vmin rgba(255,210,63,.95)} }
  </style>
</head>
<body>
  <div id="bg"></div>
  <a id="toforest" href="index.html?from=deep" aria-label="forest">🌲</a>
  <div id="ticks"></div>
  <canvas id="squish"></canvas>
  <div id="sky">
    <div id="perch">🦔<div id="flower">🌼</div></div>
    <div id="fly" class="hover"><span class="b">🦋</span></div>
  </div>
  <main id="stage">
    <div id="pips"></div>
    <div id="deck">
      <div class="kcol"><div class="bigkey" id="ka">a</div><div class="hand left" id="hl"></div></div>
      <div class="kcol"><div class="bigkey" id="ks">;</div><div class="hand" id="hr"></div></div>
    </div>
  </main>
  <div id="ver">butterfly v5</div>

  <script src="hand.js?v=4"></script>
  <script>
    buildHand(document.getElementById('hl'), {cuff:'#0369a1'});
    buildHand(document.getElementById('hr'), {cuff:'#0369a1'});
    // a flaps the left wing, ; flaps the right — alternating pinkies fly the butterfly
    // up to the hedgehog waiting at the top. Landing = the flower crown blooms.
    function randSeq(n){ let s=''; for(let i=0;i<n;i++) s+=Math.random()<0.5?'a':';'; return s; }
    const STAGES = ['a;a;a;a;', 'aa;;aa;;aa;;', randSeq(16)];   // alternation, doubles, then a surprise mix
    let stage = 0, idx = 0, busy = false;
    const fly = document.getElementById('fly'), bfly = fly.querySelector('.b'),
          flower = document.getElementById('flower'),
          ka = document.getElementById('ka'), ks = document.getElementById('ks'),
          hl = document.getElementById('hl'), hr = document.getElementById('hr');

    (function(){ const bg=document.getElementById('bg');
      for(let i=0;i<18;i++){ const p=document.createElement('div'); p.className='petal';
        p.style.left=Math.random()*100+'vw'; p.style.setProperty('--drift',(Math.random()*20-10)+'vw');
        p.style.animationDuration=(8+Math.random()*9)+'s'; p.style.animationDelay=(-Math.random()*15)+'s';
        p.style.transform='scale('+(0.7+Math.random()*0.9)+')'; bg.appendChild(p);} })();

    function want(){ return STAGES[stage][idx]; }
    function cue(){
      const w = want();
      ka.classList.toggle('want', w==='a'); ks.classList.toggle('want', w===';');
      hl.querySelector('.f-pinky').classList.toggle('active', w==='a');
      hr.querySelector('.f-pinky').classList.toggle('active', w===';');
    }
    const pipsEl = document.getElementById('pips');
    function buildPips(n){ pipsEl.innerHTML=''; const sz=Math.min(5, 60/n); pipsEl.style.gap=Math.min(2, 14/n)+'vmin';
      for(let i=0;i<n;i++){ const p=document.createElement('div'); p.className='pip'; p.style.width=p.style.height=sz+'vmin'; pipsEl.appendChild(p);} }
    function markPip(i){ const p=pipsEl.children[i]; if(p){ p.classList.add('on'); p.style.background=COLS[i%COLS.length]; p.style.borderColor='rgba(255,255,255,.8)'; } }
    let round = 0;
    const ticksEl = document.getElementById('ticks');
    function drawTicks(){ ticksEl.innerHTML='';
      for(let i=0;i<3;i++){ const t=document.createElement('div'); t.className='tick'+(i<round?' done':'');
        t.textContent=i<round?'⭐':''; ticksEl.appendChild(t); } }
    function graduate(){                      // three rounds done — graduated from this station!
      busy = true;
      const g=document.createElement('div'); g.id='grad'; g.innerHTML='<div id="gradcup">🏆</div>';
      document.body.appendChild(g);
      document.getElementById('toforest').classList.add('glow');
      [0,700,1400].forEach(d=>setTimeout(()=>{ chord(); squishBurst(); }, d));
    }
    drawTicks();
    function renderStage(){ idx = 0; fly.style.bottom='38vh'; flower.classList.remove('bloom'); fly.classList.add('hover'); cue(); buildPips(STAGES[stage].length); }
    function press(){
      const n = STAGES[stage].length, w = want();
      const hand = w==='a' ? hl : hr;
      const fin = hand.querySelector('.f-pinky');
      fin.classList.add('tap'); setTimeout(()=>fin.classList.remove('tap'),120);
      bfly.classList.remove('flapL','flapR'); void bfly.offsetWidth;
      bfly.classList.add(w==='a' ? 'flapL' : 'flapR');
      flap(idx); markPip(idx);
      idx++;
      fly.style.bottom = (38 + (idx/n) * 48) + 'vh';       // one wingbeat higher
      if(idx >= n){ busy = true; fly.classList.remove('hover'); land(); setTimeout(next, 3200); }
      else cue();
    }
    function land(){
      ka.classList.remove('want'); ks.classList.remove('want');
      hl.querySelector('.f-pinky').classList.remove('active'); hr.querySelector('.f-pinky').classList.remove('active');
      setTimeout(()=>{ flower.classList.add('bloom'); chord(); squishBurst(); }, 500);
    }
    function next(){
      stage++;
      if(stage >= STAGES.length){
        stage = 0; round++; drawTicks();
        if(round >= 3){ graduate(); return; }
        STAGES[2] = randSeq(16);
      }
      renderStage(); busy = false;
    }

    addEventListener('keydown',(e)=>{
      if(busy || e.key.length!==1) return;
      if(e.key.toLowerCase()===want()) press();
      else { const k = want()==='a' ? ka : ks;
        k.classList.remove('nope'); void k.offsetWidth; k.classList.add('nope'); }
    });

    let actx=null;
    function ac(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
    const SCALE=[1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8, 2];
    function flap(n){                                        // soft airy wingbeat, climbing the scale
      const c=ac(), t=c.currentTime, f=330 * SCALE[n%8] * Math.pow(2,Math.floor(n/8));
      const o=c.createOscillator(), g=c.createGain(); o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.3,t+.03);
      g.gain.exponentialRampToValueAtTime(.0001,t+.35);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t+.4);
    }
    function chord(){
      const c=ac(), t=c.currentTime;
      [523,659,784,1047,1319].forEach((f,k)=>{ const o=c.createOscillator(),g=c.createGain(); o.type='triangle'; o.frequency.value=f;
        g.gain.setValueAtTime(.0001,t+k*.05); g.gain.exponentialRampToValueAtTime(.2,t+.06+k*.05); g.gain.exponentialRampToValueAtTime(.0001,t+1.6);
        o.connect(g).connect(c.destination); o.start(t+k*.05); o.stop(t+1.7); });
    }

    const cv=document.getElementById('squish'), cx=cv.getContext('2d');
    function fit(){ cv.width=innerWidth; cv.height=innerHeight; }
    addEventListener('resize',fit); fit();
    const COLS=['#38bdf8','#bae6fd','#ff8fc0','#ffd23f','#a78bfa','#f472b6','#7dd3fc'];
    let squishes=[], raf=null;
    const G=0.75, REST=0.5;
    function squishBurst(){
      const cxp=innerWidth/2, cyp=innerHeight*0.3;
      const KINDS=['cube','circle','sausage'], DECOS=['none','none','dots','face'];
      for(let i=0;i<30;i++){
        const deco=DECOS[(Math.random()*DECOS.length)|0], dots=[];
        if(deco==='dots') for(let k=0;k<4;k++) dots.push({x:(Math.random()-.5)*1.2, y:(Math.random()-.5)*1.2});
        squishes.push({
          x:cxp+(Math.random()-.5)*100, y:cyp+(Math.random()-.5)*60,
          vx:(Math.random()-.5)*20, vy:-Math.random()*12-3,
          r:16+Math.random()*16, c:COLS[(Math.random()*COLS.length)|0], squash:1, born:performance.now(),
          kind:KINDS[(Math.random()*KINDS.length)|0], deco, dots });
      }
      if(squishes.length>80) squishes.splice(0, squishes.length-80);
      if(!raf) loop();
    }
    function loop(){
      cx.clearRect(0,0,cv.width,cv.height);
      const nowT=performance.now();                        // celebrations melt away after a few seconds
      squishes=squishes.filter(s=>{ if(nowT-s.born>5500) s.r*=0.90; return s.r>2; });
      if(!squishes.length){ raf=null; return; }
      for(const s of squishes){
        s.vy+=G; s.x+=s.vx; s.y+=s.vy;
        if(s.y+s.r>cv.height){ s.y=cv.height-s.r; if(s.vy>4)s.squash=.6; s.vy*=-REST; s.vx*=.94; if(Math.abs(s.vy)<1.2)s.vy=0; }
        if(s.x<s.r){ s.x=s.r; s.vx*=-REST; } if(s.x>cv.width-s.r){ s.x=cv.width-s.r; s.vx*=-REST; }
        s.squash+=(1-s.squash)*0.15;
      }
      for(let i=0;i<squishes.length;i++) for(let j=i+1;j<squishes.length;j++){
        const a=squishes[i], b=squishes[j]; let dx=b.x-a.x, dy=b.y-a.y; let d=Math.hypot(dx,dy)||0.001; const min=a.r+b.r;
        if(d<min){ const nx=dx/d, ny=dy/d, ov=(min-d)/2;
          a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
          const vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
          if(vn<0){ const imp=-(1+REST)*vn/2; a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny; }
        }
      }
      for(const s of squishes){
        cx.save(); cx.translate(s.x,s.y); cx.scale(2-s.squash, s.squash);
        cx.fillStyle=s.c;
        if(s.kind==='circle'){ cx.beginPath(); cx.arc(0,0,s.r,0,7); cx.fill(); }
        else if(s.kind==='sausage'){ roundRect(-s.r*1.3,-s.r*0.62,s.r*2.6,s.r*1.24,s.r*0.62); cx.fill(); }
        else { roundRect(-s.r,-s.r,s.r*2,s.r*2,s.r*0.5); cx.fill(); }
        if(s.deco==='dots'){ cx.fillStyle='rgba(255,255,255,.8)';
          for(const d of s.dots){ cx.beginPath(); cx.arc(d.x*s.r,d.y*s.r,s.r*0.16,0,7); cx.fill(); } }
        else if(s.deco==='face'){ cx.fillStyle='#2a1133';
          cx.beginPath(); cx.arc(-s.r*0.32,-s.r*0.12,s.r*0.13,0,7); cx.arc(s.r*0.32,-s.r*0.12,s.r*0.13,0,7); cx.fill();
          cx.beginPath(); cx.arc(0,s.r*0.05,s.r*0.32,0.15*Math.PI,0.85*Math.PI); cx.lineWidth=s.r*0.09; cx.strokeStyle='#2a1133'; cx.stroke(); }
        cx.restore();
      }
      raf=requestAnimationFrame(loop);
    }
    function roundRect(x,y,w,h,r){ cx.beginPath(); cx.moveTo(x+r,y);
      cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); }

    renderStage();
  </script>
</body>
</html>
